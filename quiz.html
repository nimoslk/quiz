<!DOCTYPE html>
<html>

   <head>
    <meta charset="UTF-8"> <title>Quiz App</title>
    <link rel="stylesheet" href="quiz.css">
</head>
<body>

    <div id="quiz-box" class="quiz-container">
        <div class="quiz-header">
            <span id="timer">වේලාව: 05:00</span>
            <span id="progress"></span>
        </div>
        
        <h2 id="question-text"></h2>
        <div id="options-container" class="options-grid"></div>

        <div class="navigation">
            <button onclick="changeQuestion(-1)">Previous</button>
            <div id="nav-dots"></div>
            <button onclick="changeQuestion(1)">Next</button>
        </div>
        
        <button id="submit-btn" class="hide" onclick="endQuiz()">Submit</button>
    </div>

    <div id="result-box" class="hide">
        <div id="score-text"></div>
        <div id="review-section"></div>
        <button onclick="location.reload()">Retry</button>
    </div>

    <script src="quiz.js"></script>
</body>

</html>
